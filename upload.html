<!-- upload-ui.html - Simple drag-and-drop interface -->
<!DOCTYPE html>
<html>
<head>
    <title>Property Manager - Image Uploader</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .drop-zone { border: 2px dashed #ccc; border-radius: 10px; padding: 40px; text-align: center; margin: 20px 0; cursor: pointer; }
        .drop-zone.drag-over { border-color: #1a4d3c; background: #f0f8f0; }
        button { background: #1a4d3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0d3a2c; }
        .preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin: 20px 0; }
        .preview img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
        .result { background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 20px; display: none; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>📸 Property Manager - Image Uploader</h1>
    
    <div>
        <label>Property ID:</label>
        <input type="number" id="propertyId" placeholder="Enter property ID" style="width: 100%; padding: 8px; margin: 10px 0;">
    </div>
    
    <div id="dropZone" class="drop-zone">
        📁 Drag & drop images here or click to select
        <br><small>Supported: JPG, PNG, WebP, GIF (Max 20MB each)</small>
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
    </div>
    
    <div id="preview" class="preview"></div>
    
    <button id="uploadBtn" style="width: 100%;">📤 Upload to Cache</button>
    
    <div id="result" class="result"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const uploadBtn = document.getElementById('uploadBtn');
        const resultDiv = document.getElementById('result');
        const propertyIdInput = document.getElementById('propertyId');
        
        let selectedFiles = [];
        
        // Click to select files
        dropZone.addEventListener('click', () => fileInput.click());
        
        // Drag & drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(Array.from(e.dataTransfer.files));
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(Array.from(e.target.files));
        });
        
        function handleFiles(files) {
            selectedFiles = files.filter(f => f.type.startsWith('image/'));
            preview.innerHTML = '';
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
        
        uploadBtn.addEventListener('click', async () => {
            const propertyId = propertyIdInput.value;
            if (!propertyId) {
                alert('Please enter Property ID');
                return;
            }
            
            if (selectedFiles.length === 0) {
                alert('Please select images');
                return;
            }
            
            const apiKey = prompt('Enter API Key:');
            if (!apiKey) return;
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>Uploading images... ⏳</p>';
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });
            formData.append('propertyId', propertyId);
            
            try {
                const response = await fetch('http://localhost:8080/upload-batch', {
                    method: 'POST',
                    headers: { 'x-api-key': apiKey },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ Upload complete!</p>
                        <p>Total: ${data.summary.total} | Success: ${data.summary.success} | Failed: ${data.summary.failed}</p>
                        <details><summary>Details</summary>
                        <pre>${JSON.stringify(data.results, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Upload failed: ${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
            
            uploadBtn.disabled = false;
            uploadBtn.textContent = '📤 Upload to Cache';
        });
    </script>
</body>
</html>
